services:
  - type: web
    name: smart-estimator-api
    runtime: python
    region: oregon
    buildCommand: pip install -r backend/smart-estimator/requirements.txt
    startCommand: cd backend/smart-estimator && uvicorn smart_estimator_api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
