<style>
        body {
            background-color: #f8f9fb;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .option-card:hover {
            border-color: #004ac6;
            background-color: #ffffff;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
        }
        .option-card.selected {
            border-color: #004ac6;
            background-color: #f0f4ff;
            ring: 2px solid #004ac6;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center">
<!-- Top AppBar (Simplified for Onboarding) -->
<header class="w-full bg-surface-container-lowest border-b border-outline-variant sticky top-0 z-50">
<div class="flex justify-between items-center px-gutter py-stack-md max-w-container-max mx-auto h-16">
<div class="font-headline-md text-headline-md font-bold text-primary">
                Passyo
            </div>
<div class="flex items-center gap-stack-sm text-secondary font-label-md text-label-md">
                Besoin d'aide ? 
                <span class="material-symbols-outlined text-body-lg">help</span>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="w-full max-w-4xl px-gutter py-12 md:py-24 flex flex-col items-center">
<!-- Multi-Step Wizard Progress Bar -->
<div class="w-full max-w-md mb-12">
<div class="flex justify-between items-center mb-4">
<span class="text-primary font-label-md text-label-md font-bold uppercase tracking-widest">Étape 1 / 2</span>
<span class="text-secondary font-label-md text-label-md">Qualification</span>
</div>
<div class="h-1 bg-surface-container-highest w-full rounded-full overflow-hidden">
<div class="h-full bg-primary w-1/2 transition-all duration-700 ease-out" style="width: 50%;"></div>
</div>
</div>
<!-- Question Header -->
<div class="text-center mb-12">
<h1 class="font-display text-display text-on-surface mb-4">Combien de projets gérez-vous par an ?</h1>
<p class="font-body-lg text-body-lg text-secondary max-w-xl mx-auto">
                Ces informations nous permettent de configurer votre tableau de bord Passyo selon les standards de votre secteur.
            </p>
</div>
<!-- Selection Cards (Bento Grid Style) -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-stack-md w-full">
<!-- Option 1 -->
<button class="option-card group flex items-start p-stack-md bg-surface-container-lowest border border-outline-variant rounded-xl transition-all duration-200 text-left cursor-pointer active:scale-[0.98]" onclick="selectOption(this)">
<div class="p-3 rounded-lg bg-surface-container-low text-primary group-hover:bg-primary group-hover:text-white transition-colors mr-4">
<span class="material-symbols-outlined text-2xl">apartment</span>
</div>
<div>
<h3 class="font-headline-md text-headline-md text-on-surface">1 - 5 projets</h3>
<p class="font-body-md text-body-md text-secondary">Idéal pour les entreprises artisanales ou les projets spécifiques.</p>
</div>
</button>
<!-- Option 2 -->
<button class="option-card group flex items-start p-stack-md bg-surface-container-lowest border border-outline-variant rounded-xl transition-all duration-200 text-left cursor-pointer active:scale-[0.98]" onclick="selectOption(this)">
<div class="p-3 rounded-lg bg-surface-container-low text-primary group-hover:bg-primary group-hover:text-white transition-colors mr-4">
<span class="material-symbols-outlined text-2xl">corporate_fare</span>
</div>
<div>
<h3 class="font-headline-md text-headline-md text-on-surface">6 - 15 projets</h3>
<p class="font-body-md text-body-md text-secondary">Pour les PME en pleine croissance gérant plusieurs chantiers.</p>
</div>
</button>
<!-- Option 3 -->
<button class="option-card group flex items-start p-stack-md bg-surface-container-lowest border border-outline-variant rounded-xl transition-all duration-200 text-left cursor-pointer active:scale-[0.98]" onclick="selectOption(this)">
<div class="p-3 rounded-lg bg-surface-container-low text-primary group-hover:bg-primary group-hover:text-white transition-colors mr-4">
<span class="material-symbols-outlined text-2xl">domain</span>
</div>
<div>
<h3 class="font-headline-md text-headline-md text-on-surface">16 - 50 projets</h3>
<p class="font-body-md text-body-md text-secondary">Conçu pour les structures établies avec une gestion multi-sites.</p>
</div>
</button>
<!-- Option 4 -->
<button class="option-card group flex items-start p-stack-md bg-surface-container-lowest border border-outline-variant rounded-xl transition-all duration-200 text-left cursor-pointer active:scale-[0.98]" onclick="selectOption(this)">
<div class="p-3 rounded-lg bg-surface-container-low text-primary group-hover:bg-primary group-hover:text-white transition-colors mr-4">
<span class="material-symbols-outlined text-2xl">architecture</span>
</div>
<div>
<h3 class="font-headline-md text-headline-md text-on-surface">50+ / Sur-mesure</h3>
<p class="font-body-md text-body-md text-secondary">Solutions Enterprise pour les grands groupes de construction.</p>
</div>
</button>
</div>
<!-- Navigation Action -->
<div class="mt-16 flex flex-col items-center gap-4">
<button class="px-12 py-4 bg-primary text-white font-bold rounded-lg opacity-50 cursor-not-allowed transition-all duration-300 hover:bg-primary-container active:scale-95 flex items-center gap-2" disabled="" id="nextBtn">
                Continuer
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
<p class="text-secondary font-label-md text-label-md">Vous pourrez modifier ces informations plus tard.</p>
</div>
</main>
<!-- Background Atmospheric Effect -->
<div class="fixed inset-0 pointer-events-none -z-10 opacity-30">

</div>
<!-- Decorative Image Placeholder (Hidden Contextual) -->
<div class="fixed bottom-0 right-0 w-1/4 h-1/4 opacity-10 overflow-hidden pointer-events-none">
<img alt="Blueprint" class="object-cover w-full h-full grayscale" data-alt="A detailed architectural blueprint spread across a clean white drafting table with precise technical drawings of a modern building structure. The scene is illuminated by soft daylight from a side window, emphasizing order and clarity. The color palette is composed of soft whites, cool grays, and deep navy blue lines, reflecting a professional and minimalist SaaS aesthetic for construction planning." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAKXtwq4c8OQwY5TVy8wTGfe0ECY5-aqAZJnlX07dXC2GMNBBR2rNWn6iumb3egoEJpqLA6FTWH85_eh986LU9xuwi382gEgE2MM_kqp9jCXKDsMVkm6lqaavJMrlsbkDjMevvnIb7-ZtmNUegF4OFU5qV7DUI6t7EpIl65EV8SN9qE9q0yVR9hl7Q4mjJQeKpWrXqcGRsFPOf_zmsiUqBc3eZ7pvoHkkRIGxc18uqjs4yTrr81CrJf8TvTVbCpo8gJN8GepXN7YpU">
</div>
<script>
        function selectOption(element) {
            // Remove selection from all cards
            const allCards = document.querySelectorAll('.option-card');
            allCards.forEach(card => {
                card.classList.remove('selected', 'ring-2', 'ring-primary');
                card.querySelector('div').classList.remove('bg-primary', 'text-white');
                card.querySelector('div').classList.add('bg-surface-container-low', 'text-primary');
            });

            // Add selection to clicked card
            element.classList.add('selected', 'ring-2', 'ring-primary');
            const iconContainer = element.querySelector('div');
            iconContainer.classList.remove('bg-surface-container-low', 'text-primary');
            iconContainer.classList.add('bg-primary', 'text-white');

            // Enable Next Button
            const nextBtn = document.getElementById('nextBtn');
            nextBtn.disabled = false;
            nextBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            
            // Subtle feedback
            console.log('Option selected: ' + element.querySelector('h3').innerText);
        }

        // Add small animation to progress bar on load
        window.addEventListener('DOMContentLoaded', () => {
            const progress = document.querySelector('.h-full.bg-primary');
            progress.style.width = '0%';
            setTimeout(() => {
                progress.style.width = '50%';
            }, 100);
        });
    </script>
</body></html>
