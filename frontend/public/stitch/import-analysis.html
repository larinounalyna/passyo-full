<!-- STITCH_SHADER_START:ANIMATION_23 class="absolute inset-0 w-full h-full opacity-40" -->
<div class="absolute inset-0 w-full h-full opacity-40" style="display:block;">
<canvas id="shader-canvas-ANIMATION_23" style="display:block;width:100%;height:100%"></canvas>
<script>
(function() {
  const canvas = document.getElementById('shader-canvas-ANIMATION_23');

  // Sync the WebGL drawing-buffer size with the CSS-driven layout size.
  // This fires on initial layout and whenever the element is resized.
  function syncSize() {
    const w = canvas.clientWidth  || 1280;
    const h = canvas.clientHeight || 720;
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width  = w;
      canvas.height = h;
    }
  }
  if (typeof ResizeObserver !== 'undefined') {
    new ResizeObserver(syncSize).observe(canvas);
  }
  syncSize();

  const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (!gl) return;
  const vs = `attribute vec2 a_position;
varying vec2 v_texCoord;
void main() {
  v_texCoord = a_position * 0.5 + 0.5;
  gl_Position = vec4(a_position, 0.0, 1.0);
}`;
  const fs = `precision highp float;
uniform float u_time;
uniform vec2 u_resolution;
uniform vec2 u_mouse;

void main() {
    vec2 uv = gl_FragCoord.xy / u_resolution.xy;
    vec2 mouse = u_mouse / u_resolution;
    
    // Abstract fluid movement
    float motion = sin(uv.x * 10.0 + u_time * 0.5) * cos(uv.y * 10.0 + u_time * 0.5);
    motion += sin(distance(uv, mouse) * 5.0 - u_time);
    
    // Passyo-inspired blues
    vec3 color1 = vec3(0.145, 0.388, 0.922); // #2563eb
    vec3 color2 = vec3(0.973, 0.976, 0.984); // #f8f9fb
    
    vec3 finalColor = mix(color1, color2, 0.8 + 0.2 * motion);
    
    gl_FragColor = vec4(finalColor, 0.15); // Subtle overlay
}`;
  function cs(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    return s;
  }
  const prog = gl.createProgram();
  gl.attachShader(prog, cs(gl.VERTEX_SHADER, vs));
  gl.attachShader(prog, cs(gl.FRAGMENT_SHADER, fs));
  gl.linkProgram(prog);
  gl.useProgram(prog);
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  const pos = gl.getAttribLocation(prog, 'a_position');
  gl.enableVertexAttribArray(pos);
  gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);
  const uTime = gl.getUniformLocation(prog, 'u_time');
  const uRes = gl.getUniformLocation(prog, 'u_resolution');
  const uMouse = gl.getUniformLocation(prog, 'u_mouse');

  // u_mouse is in pixel coordinates matching u_resolution (ShaderToy convention).
  // Shaders that need normalized coords should use: u_mouse / u_resolution.
  let mouse = { x: canvas.width / 2, y: canvas.height / 2 };
  window.addEventListener('mousemove', (event) => {
    const rect = canvas.getBoundingClientRect();
    if (rect.width && rect.height) {
      const nx = (event.clientX - rect.left) / rect.width;
      const ny = 1.0 - (event.clientY - rect.top) / rect.height;
      mouse.x = nx * canvas.width;
      mouse.y = ny * canvas.height;
    }
  });

  function render(t) {
    if (typeof ResizeObserver === 'undefined') syncSize();
    gl.viewport(0, 0, canvas.width, canvas.height);
    if (uTime) gl.uniform1f(uTime, t * 0.001);
    if (uRes) gl.uniform2f(uRes, canvas.width, canvas.height);
    if (uMouse) gl.uniform2f(uMouse, mouse.x, mouse.y);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(render);
  }
  render(0);
})();
</script>

            </p>

<script>
        const messages = [
            'Analyse de la structure...',
            'Vérification de l\'intégrité des données...',
            'Identification des nœuds critiques...',
            'Création des catégories dynamiques...',
            'Calcul des rendements théoriques...',
            'Optimisation du séquençage...',
            'Finalisation de l\'environnement...'
        ];

        let currentMessageIndex = 0;
        let progress = 0;
        
        const messageEl = document.getElementById('dynamicMessage');
        const percentEl = document.getElementById('percentText');
        const circleEl = document.getElementById('progressCircle');
        const barFillEl = document.getElementById('progressBarFill');
        
        const circumference = 2 * Math.PI * 45;

        function updateUI() {
            // Update Text
            if (progress % 15 === 0 || progress === 0) {
                messageEl.style.opacity = 0;
                setTimeout(() => {
                    messageEl.innerText = messages[currentMessageIndex % messages.length];
                    messageEl.style.opacity = 1;
                    currentMessageIndex++;
                }, 300);
            }

            // Update Progress Percentage
            percentEl.innerText = `${progress}%`;
            
            // Update SVG Circle
            const offset = circumference - (progress / 100) * circumference;
            circleEl.style.strokeDashoffset = offset;

            // Update Linear Bar
            barFillEl.style.width = `${progress}%`;

            if (progress < 100) {
                // Slower near the end for "realism"
                let increment = 1;
                if (progress > 85) increment = 0.2;
                else if (progress > 60) increment = 0.5;

                progress = Math.min(100, Math.round((progress + increment) * 10) / 10);
                
                // Keep it looking like an integer for UI
                percentEl.innerText = `${Math.floor(progress)}%`;
                
                const nextTick = Math.random() * 200 + 50;
                setTimeout(updateUI, nextTick);
            } else {
                messageEl.innerText = 'Prêt pour le mapping !';
                document.getElementById('mainTitle').innerText = 'Traitement terminé';
                // Simulation of transition
                setTimeout(() => {
                    document.body.style.opacity = '0.5';
                    document.body.style.transition = 'opacity 1s';
                }, 1000);
            }
        }

        // Start the process
        setTimeout(updateUI, 1000);
    </script>
